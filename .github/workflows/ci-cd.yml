name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: docker build -t edupredictops-scan:latest ./app/flask-api

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: edupredictops-scan:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  build-and-push:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Flask API image
        uses: docker/build-push-action@v5
        with:
          context: ./app/flask-api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/edupredictops:latest
